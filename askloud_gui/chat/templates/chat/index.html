<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Askloud — Cloud Inventory</title>

  <!-- Tabulator — interactive table library -->
  <link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_midnight.min.css" rel="stylesheet">
  <script src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>

  <!-- Plotly — charts -->
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

  {% load static %}
  <link rel="stylesheet" href="{% static 'chat/style.css' %}">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <span class="logo">☁ Askloud</span>
    <span class="tagline">Multi-cloud inventory</span>
  </div>
  <div class="header-right">
    <span id="status-badge" class="badge badge-loading">Loading…</span>
    <span id="mode-badge" class="badge badge-snapshot" title="Current query mode">snapshot</span>
    <button id="toggle-mode" class="btn-mode" title="Switch query mode">Switch to live</button>
    <button id="clear-history" class="btn-clear" title="Clear conversation history">Clear history</button>
  </div>
</header>

<!-- ── Status bar ─────────────────────────────────────────────────────── -->
<div id="status-bar" class="status-bar hidden">
  <span id="resources-label"></span>
  <span id="age-label"></span>
</div>

<!-- ── Main layout ────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Left: data/results panel (80%) -->
  <section class="data-panel" id="data-panel">
    <div id="data-area">
      <div class="data-empty">
        <div class="data-empty-icon">☁</div>
        <div class="data-empty-title">Ask Askloud anything</div>
        <div class="data-empty-hint">e.g. "list running EC2 instances" or "show all Azure VMs by region"</div>
      </div>
    </div>
  </section>

  <!-- Right: chat panel (20%) -->
  <aside class="chat-panel">
    <div class="chat-messages" id="messages"></div>
    <div class="chat-footer">
      <form id="query-form" autocomplete="off">
        <input
          id="query-input"
          type="text"
          placeholder="Ask a question…"
          spellcheck="false"
          autofocus
        >
        <button type="submit" id="send-btn">Send</button>
      </form>
      <div id="cost-bar" class="cost-bar hidden"></div>
    </div>
  </aside>

</div>

<script src="{% static 'chat/app.js' %}?v={% now "U" %}"></script>
</body>
</html>
