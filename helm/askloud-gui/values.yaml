replicaCount: 1
# GUI image — repository and tag are updated automatically by GitHub Actions
# on every push to main.
image:
  repository: "099878477985.dkr.ecr.ap-south-1.amazonaws.com/askloud-gui" # injected by CI: ACCOUNT.dkr.ecr.REGION.amazonaws.com/askloud-gui
  tag: c165055
  pullPolicy: Always
service:
  type: ClusterIP
  port: 80
env:
  djangoDebug: "false"
  askloudBaseDir: /app
# Names of pre-existing Kubernetes Secrets.  deploy-eks.sh (or ArgoCD
# pre-sync hooks) creates these before the Helm release is installed.
secrets:
  askloud: askloud-secrets # ANTHROPIC_API_KEY, DJANGO_SECRET_KEY
  aws: cloud-creds-aws
  azure: cloud-creds-azure
  gcp: cloud-creds-gcp
persistence:
  enabled: true
  existingClaim: "askloud-data"   # reuse the PVC created by deploy-eks.sh; set to "" to let Helm create one
  storageClassName: ebs-io2
  size: 10Gi
# Collector CronJob — image updated by CI alongside the GUI image
collector:
  enabled: true
  schedule: "0 */6 * * *"
  image:
    repository: "099878477985.dkr.ecr.ap-south-1.amazonaws.com/askloud-engine" # injected by CI: ACCOUNT.dkr.ecr.REGION.amazonaws.com/askloud-engine
    tag: c165055
    pullPolicy: Always
resources: {}
#  requests:
#    cpu: 250m
#    memory: 512Mi
#  limits:
#    cpu: 1
#    memory: 1Gi

readinessProbe:
  path: /api/status/
  initialDelaySeconds: 10
  periodSeconds: 5
livenessProbe:
  path: /api/status/
  initialDelaySeconds: 20
  periodSeconds: 15
