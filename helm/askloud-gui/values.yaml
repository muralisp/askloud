replicaCount: 1

# GUI image — repository and tag are updated automatically by GitHub Actions
# on every push to main.
image:
  repository: ""   # injected by CI: ACCOUNT.dkr.ecr.REGION.amazonaws.com/askloud-gui
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

env:
  djangoDebug: "false"
  askloudBaseDir: /app

# Names of pre-existing Kubernetes Secrets.  deploy-eks.sh (or ArgoCD
# pre-sync hooks) creates these before the Helm release is installed.
secrets:
  askloud: askloud-secrets    # ANTHROPIC_API_KEY, DJANGO_SECRET_KEY
  aws: cloud-creds-aws
  azure: cloud-creds-azure
  gcp: cloud-creds-gcp

persistence:
  enabled: true
  storageClassName: ebs-io2
  size: 10Gi

# Collector CronJob — image updated by CI alongside the GUI image
collector:
  enabled: true
  schedule: "0 */6 * * *"
  image:
    repository: ""   # injected by CI: ACCOUNT.dkr.ecr.REGION.amazonaws.com/askloud-engine
    tag: latest
    pullPolicy: Always

resources: {}
#  requests:
#    cpu: 250m
#    memory: 512Mi
#  limits:
#    cpu: 1
#    memory: 1Gi

readinessProbe:
  path: /api/status/
  initialDelaySeconds: 10
  periodSeconds: 5

livenessProbe:
  path: /api/status/
  initialDelaySeconds: 20
  periodSeconds: 15
