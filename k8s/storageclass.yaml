apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-io2
provisioner: ebs.csi.aws.com
parameters:
  type: io2
  iops: "3000"
  encrypted: "true"
volumeBindingMode: WaitForFirstConsumer   # volume created in the same AZ as the scheduled pod
allowVolumeExpansion: true
reclaimPolicy: Retain
