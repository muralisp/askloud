# Fill in base64-encoded values before applying:
#   echo -n 'your-value' | base64
#
# Or let setup-minikube.sh generate this from environment variables.
apiVersion: v1
kind: Secret
metadata:
  name: askloud-secrets
  namespace: askloud
type: Opaque
data:
  ANTHROPIC_API_KEY: REPLACE_BASE64
  DJANGO_SECRET_KEY: REPLACE_BASE64
