name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "helm/askloud-gui/values.yaml"  # avoid re-triggering on the bot's own commit
      - "**.md"
      - "terraform/**"
    tags:
      - "v*"                            # v1.0.0, v1.2.3-rc1, etc. → prod deploy
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  id-token: write   # required for OIDC token
  contents: write   # required to commit updated values.yaml back

env:
  AWS_REGION: ap-south-1

jobs:
  build-push-update:
    name: Build → Push ECR → Update Helm
    runs-on: ubuntu-latest

    # Resolve target environment:
    #   v* tag  → prod
    #   main    → dev
    #   manual  → whatever the input says
    env:
      TARGET_ENV: >-
        ${{
          startsWith(github.ref, 'refs/tags/v') && 'prod' ||
          github.event.inputs.environment || 'dev'
        }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── AWS auth via OIDC (no static credentials) ─────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── ECR login ─────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Derive image tag ───────────────────────────────────────────────────
      # Tags: v1.2.3 → "v1.2.3"; branch push → short SHA (e.g. "a1b2c3d")
      - name: Set image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "value=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      # ── Build and push both images ─────────────────────────────────────────
      - name: Build and push askloud-engine
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/askloud-engine:${{ steps.tag.outputs.value }}

      - name: Build and push askloud-gui
        uses: docker/build-push-action@v5
        with:
          context: .
          file: askloud_gui/Dockerfile
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/askloud-gui:${{ steps.tag.outputs.value }}

      # ── Update Helm values.yaml with new image ─────────────────────────────
      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Update image repository and tag in values.yaml
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          TAG="${{ steps.tag.outputs.value }}"

          yq e ".image.repository            = \"${REGISTRY}/askloud-gui\""     -i helm/askloud-gui/values.yaml
          yq e ".image.tag                   = \"${TAG}\""                       -i helm/askloud-gui/values.yaml
          yq e ".collector.image.repository  = \"${REGISTRY}/askloud-engine\""  -i helm/askloud-gui/values.yaml
          yq e ".collector.image.tag         = \"${TAG}\""                       -i helm/askloud-gui/values.yaml

      # ── Commit the updated values.yaml so ArgoCD picks it up ──────────────
      - name: Commit and push updated Helm values
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/askloud-gui/values.yaml
          git diff --staged --quiet \
            || git commit -m "ci: deploy ${{ steps.tag.outputs.value }} to ${{ env.TARGET_ENV }} [skip ci]"
          git push
